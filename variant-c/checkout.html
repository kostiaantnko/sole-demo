<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout — SOLE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="header-inner">
    <a href="index.html" class="logo">SOLE · C</a>
    <nav class="header-nav">
      <a href="index.html">Catalog</a>
    </nav>
    <div class="header-actions">
      <a href="checkout.html" class="cart-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/>
          <path d="M16 10a4 4 0 01-8 0"/>
        </svg>
        Bag
        <span class="cart-badge">0</span>
      </a>
    </div>
  </div>
</header>

<main class="page">
  <div id="orderSuccess" class="order-success">
    <div class="order-success-icon">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2" stroke-linecap="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
    <h2>Order placed</h2>
    <p>Thanks for your purchase. You'll receive a confirmation shortly.</p>
    <a href="index.html">Continue shopping</a>
  </div>

  <div id="checkoutContent">
    <div class="checkout-layout">

      <!-- Form -->
      <div>
        <h1 class="checkout-title">Checkout</h1>

        <div id="emptyCart" class="empty-cart" style="display:none">
          Your bag is empty. <a href="index.html">Browse the catalog</a>
        </div>

        <form id="checkoutForm">
          <div class="form-section">
            <div class="form-section-title">Contact</div>
            <div class="form-group">
              <label for="email">Email address</label>
              <input type="email" id="email" placeholder="you@example.com" required>
            </div>
          </div>

          <div class="form-section">
            <div class="form-section-title">Delivery</div>
            <div class="form-row">
              <div class="form-group">
                <label for="firstName">First name</label>
                <input type="text" id="firstName" placeholder="Jane" required>
              </div>
              <div class="form-group">
                <label for="lastName">Last name</label>
                <input type="text" id="lastName" placeholder="Smith" required>
              </div>
            </div>
            <div class="form-group">
              <label for="address">Address</label>
              <input type="text" id="address" placeholder="123 Main Street" required>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label for="city">City</label>
                <input type="text" id="city" placeholder="London" required>
              </div>
              <div class="form-group">
                <label for="postcode">Postcode / ZIP</label>
                <input type="text" id="postcode" placeholder="EC1A 1BB" required>
              </div>
            </div>
            <div class="form-group">
              <label for="country">Country</label>
              <select id="country" required>
                <option value="">Select country</option>
                <option value="US">United States</option>
                <option value="GB">United Kingdom</option>
                <option value="DE">Germany</option>
                <option value="FR">France</option>
                <option value="JP">Japan</option>
                <option value="ES">Spain</option>
                <option value="IT">Italy</option>
                <option value="NL">Netherlands</option>
                <option value="AU">Australia</option>
                <option value="CA">Canada</option>
              </select>
            </div>
          </div>

          <div class="form-section">
            <div class="form-section-title">Payment</div>
            <div class="form-group">
              <label for="cardNumber">Card number</label>
              <input type="text" id="cardNumber" placeholder="1234 5678 9012 3456" maxlength="19" required>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label for="expiry">Expiry</label>
                <input type="text" id="expiry" placeholder="MM / YY" maxlength="7" required>
              </div>
              <div class="form-group">
                <label for="cvc">CVC</label>
                <input type="text" id="cvc" placeholder="123" maxlength="4" required>
              </div>
            </div>
          </div>

          <button type="submit" class="submit-btn" id="submitBtn">
            Place order — <span id="submitTotal"></span>
          </button>
        </form>
      </div>

      <!-- Summary -->
      <div class="checkout-summary">
        <div class="summary-title">Your bag</div>
        <div class="summary-items" id="summaryItems"></div>
        <hr class="summary-divider">
        <div class="summary-row">
          <span>Subtotal</span>
          <span id="summarySubtotal">—</span>
        </div>
        <div class="summary-row">
          <span>Shipping</span>
          <span>Free</span>
        </div>
        <div class="summary-row total">
          <span>Total</span>
          <span id="summaryTotal">—</span>
        </div>
      </div>

    </div>
  </div>
</main>

<footer>
  <span class="footer-logo">SOLE</span>
  <span class="footer-copy">Demo store — multi-currency exploration</span>
</footer>

<script src="data.js"></script>
<script src="app.js"></script>
<script>
  initApp();

  function renderSummary() {
    const items = Cart.items;
    const isEmpty = items.length === 0;
    const form = document.getElementById('checkoutForm');
    const empty = document.getElementById('emptyCart');
    const submitBtn = document.getElementById('submitBtn');

    form.style.display = isEmpty ? 'none' : 'block';
    empty.style.display = isEmpty ? 'block' : 'none';
    if (submitBtn) submitBtn.disabled = isEmpty;

    document.getElementById('summaryItems').innerHTML = items.map(item => `
      <div class="summary-item">
        <div class="summary-item-img">
          <img src="${item.image}" alt="${item.name}">
        </div>
        <div class="summary-item-info">
          <div class="summary-item-name">${item.name}</div>
          <div class="summary-item-meta">Size US ${item.size} · Qty ${item.qty}</div>
          <button class="summary-item-remove" data-id="${item.id}" data-size="${item.size}">Remove</button>
        </div>
        <div class="summary-item-price">${CurrencyManager.format(item.price * item.qty)}</div>
      </div>
    `).join('') || '<p style="font-size:13px;color:var(--text-2)">No items</p>';

    const total = Cart.total();
    const formatted = CurrencyManager.format(total);
    document.getElementById('summarySubtotal').textContent = formatted;
    document.getElementById('summaryTotal').textContent = formatted;
    const sub = document.getElementById('submitTotal');
    if (sub) sub.textContent = formatted;

    document.querySelectorAll('.summary-item-remove').forEach(btn => {
      btn.addEventListener('click', () => {
        Cart.remove(parseInt(btn.dataset.id), parseFloat(btn.dataset.size));
      });
    });
  }

  renderSummary();

  document.addEventListener('cartChange', renderSummary);
  document.addEventListener('currencyChange', renderSummary);

  // Card number formatting
  const cardInput = document.getElementById('cardNumber');
  cardInput.addEventListener('input', () => {
    let v = cardInput.value.replace(/\D/g, '').slice(0, 16);
    cardInput.value = v.replace(/(.{4})/g, '$1 ').trim();
  });

  // Expiry formatting
  const expiryInput = document.getElementById('expiry');
  expiryInput.addEventListener('input', () => {
    let v = expiryInput.value.replace(/\D/g, '').slice(0, 4);
    if (v.length >= 2) v = v.slice(0,2) + ' / ' + v.slice(2);
    expiryInput.value = v;
  });

  // Form submit
  document.getElementById('checkoutForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    btn.textContent = 'Processing…';
    btn.disabled = true;
    setTimeout(() => {
      Cart.clear();
      document.getElementById('checkoutContent').style.display = 'none';
      document.getElementById('orderSuccess').classList.add('show');
    }, 1200);
  });
</script>
</body>
</html>
