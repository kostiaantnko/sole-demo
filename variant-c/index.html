<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOLE — Sneaker Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="header-inner">
    <a href="index.html" class="logo">SOLE · C</a>
    <nav class="header-nav">
      <a href="index.html" class="active">Catalog</a>
    </nav>
    <div class="header-actions">
      <!-- Currency panel injected by app.js -->
      <a href="checkout.html" class="cart-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/>
          <path d="M16 10a4 4 0 01-8 0"/>
        </svg>
        Bag
        <span class="cart-badge">0</span>
      </a>
    </div>
  </div>
</header>

<main class="page">
  <div class="product-grid" id="productGrid"></div>
</main>

<footer>
  <span class="footer-logo">SOLE</span>
  <span class="footer-copy">Demo store — multi-currency exploration</span>
</footer>

<script src="data.js"></script>
<script src="app.js?v=3"></script>
<script>
  initApp();

  const grid = document.getElementById('productGrid');

  function renderGrid() {
    grid.innerHTML = PRODUCTS.map(p => `
      <a class="product-card" href="product.html?id=${p.id}">
        <div class="product-card-img">
          <img src="${p.images[0]}" alt="${p.name}" loading="lazy">
        </div>
        <div class="product-card-brand">${p.brand}</div>
        <div class="product-card-name">${p.name}</div>
        <div class="product-card-price" data-price="${p.price}">${CurrencyManager.format(p.price)}</div>
      </a>
    `).join('');
  }

  renderGrid();

  document.addEventListener('currencyChange', () => {
    document.querySelectorAll('[data-price]').forEach(el => {
      el.textContent = CurrencyManager.format(Number(el.dataset.price));
    });
  });
</script>
</body>
</html>
